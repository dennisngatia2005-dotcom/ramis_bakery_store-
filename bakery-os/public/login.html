<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BakeryOS — Sign In</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./main.css">
  <link rel="stylesheet" href="./login.css">
</head>

<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-hero">
        <div class="auth-header">
          <div class="logo">Bakery<span>OS</span></div>
          <p>Sign in to access the BakeryOS workspace. Choose your role and continue with the secure admin or worker portal.</p>
        </div>
        <div class="auth-switch" role="tablist" aria-label="Select sign-in role">
          <button type="button" class="auth-toggle active" id="adminRole" data-role="Admin">Admin</button>
          <button type="button" class="auth-toggle" id="workerRole" data-role="Worker">Worker</button>
        </div>
      </div>

      <div class="auth-content">
        <div class="card auth-form">
          <div class="card-title">Sign In</div>
          <div class="form-group">
            <label>Selected role</label>
            <input type="text" id="roleDisplay" value="Admin" readonly>
            <div class="field-note">Use the toggle above to switch between admin and worker access.</div>
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="userEmail" placeholder="you@bakeryos.local" autocomplete="username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="userPassword" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div class="form-group">
            <label>Branch or unit</label>
            <input type="text" id="userUnit" placeholder="Main Kitchen / Warehouse" autocomplete="organization">
          </div>
          <div class="form-actions">
            <button id="continueBtn" class="btn btn-primary btn-full" type="button">Continue as <span id="roleLabel">Admin</span></button>
            <button class="btn btn-ghost btn-full" type="button">Need help signing in?</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const authCookieName = 'bakeryos_auth';
    const adminBtn = document.getElementById('adminRole');
    const workerBtn = document.getElementById('workerRole');
    const roleDisplay = document.getElementById('roleDisplay');
    const roleLabel = document.getElementById('roleLabel');
    const continueBtn = document.getElementById('continueBtn');

    function setRole(role) {
      roleDisplay.value = role;
      roleLabel.textContent = role;
      adminBtn.classList.toggle('active', role === 'Admin');
      workerBtn.classList.toggle('active', role === 'Worker');
      document.getElementById('userEmail').placeholder = role === 'Admin'
        ? 'admin@bakeryos.local'
        : 'worker@bakeryos.local';
      document.getElementById('userUnit').placeholder = role === 'Admin'
        ? 'Head Office / Management'
        : 'Bakery Floor / Delivery Unit';
    }

    function setAuthCookie(role) {
      const expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
      document.cookie = `${authCookieName}=${encodeURIComponent(role)}; path=/; expires=${expires}; SameSite=Lax`;
    }

    continueBtn.addEventListener('click', () => {
      const role = roleDisplay.value || 'Admin';
      setAuthCookie(role);
      window.location.replace('./index.html');
    });

    adminBtn.addEventListener('click', () => setRole('Admin'));
    workerBtn.addEventListener('click', () => setRole('Worker'));
  </script>
</body>

</html>
